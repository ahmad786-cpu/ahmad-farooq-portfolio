<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.8" />
    </linearGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Modern Geometric Background -->
  <rect x="60" y="60" width="392" height="392" rx="100" fill="#0f172a" />
  
  <!-- Abstract 'A' Mark -->
  <g filter="url(#neon)">
    <!-- Left Leg -->
    <path d="M180 400L256 120H290L214 400H180Z" fill="url(#grad1)" />
    <!-- Right Leg -->
    <path d="M332 400L256 120H222L298 400H332Z" fill="url(#grad2)" />
    <!-- Bridge -->
    <path d="M220 300H292V330H220V300Z" fill="white" fill-opacity="0.9" />
  </g>
  
  <!-- Tech Circle -->
  <circle cx="256" cy="256" r="220" stroke="url(#grad1)" stroke-width="4" stroke-dasharray="40 20" stroke-opacity="0.3" />
  
  <!-- Corner Accent -->
  <rect x="400" y="400" width="40" height="40" rx="10" fill="url(#grad1)" />
</svg>
